    - librosa>=0.10
    - scikit-learn>=1.4
    - numpy>=1.24
    - pandas>=2.0
    - matplotlib>=3.8
    - seaborn>=0.13
    - wandb>=0.16
    - tqdm
    - streamlit
    - gradio
